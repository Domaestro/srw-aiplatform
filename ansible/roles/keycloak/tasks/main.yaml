---
- name: Run 09_install_keycloak.sh
  ansible.builtin.shell: "{{ (scripts_dir + '/09_install_keycloak.sh') | quote }}"
  register: result
  changed_when: '"unchanged" not in result.stdout'

- name: Display script output (last 20 lines)
  ansible.builtin.debug:
    msg: "{{ result.stdout_lines[-20:] if result.stdout_lines | length > 20 else result.stdout_lines }}"
