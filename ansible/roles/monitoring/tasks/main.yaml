---
- name: Run 13_install_monitoring.sh
  ansible.builtin.shell: "{{ (scripts_dir + '/13_install_monitoring.sh') | quote }}"
  register: result
  changed_when: '"no change" not in result.stdout'

- name: Display script output (last 20 lines)
  ansible.builtin.debug:
    msg: "{{ result.stdout_lines[-20:] if result.stdout_lines | length > 20 else result.stdout_lines }}"
