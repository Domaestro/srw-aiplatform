# Platform-wide role definitions matching the role model from Stage 1:
# - platform-admin    cluster-wide superuser (limited to platform operators)
# - project-admin     full control within a tenant namespace
# - ml-engineer       can create notebooks, pipelines and training jobs in a tenant ns
# - viewer            read-only view of metrics, logs and metadata in a tenant ns
#
# Bindings are created per-tenant. In production these bindings are driven by
# Keycloak group claims via Kubeflow Profile Controller; in the prototype we maintain
# them explicitly as ClusterRole + RoleBinding manifests.
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: aiplatform-project-admin
  labels:
    aiplatform.local/role-template: project-admin
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "pods/exec", "configmaps", "secrets",
                "persistentvolumeclaims", "services", "serviceaccounts", "events"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "daemonsets", "replicasets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses", "networkpolicies"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["kubeflow.org"]
    resources: ["*"]
    verbs: ["*"]
  - apiGroups: ["argoproj.io"]
    resources: ["workflows", "workflowtemplates", "cronworkflows"]
    verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: aiplatform-ml-engineer
  labels:
    aiplatform.local/role-template: ml-engineer
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "configmaps", "persistentvolumeclaims",
                "services", "events"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Secrets: list/get only — engineers consume secrets but cannot rotate them
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["kubeflow.org"]
    resources: ["notebooks", "pytorchjobs", "tfjobs", "mxjobs", "xgboostjobs", "experiments"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["argoproj.io"]
    resources: ["workflows", "workflowtemplates"]
    verbs: ["get", "list", "watch", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: aiplatform-viewer
  labels:
    aiplatform.local/role-template: viewer
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "services", "configmaps",
                "persistentvolumeclaims", "events"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "daemonsets", "replicasets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["kubeflow.org"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
---
# Demo bindings for the team-demo namespace.
# The "demo-admin" / "demo-ml" / "demo-viewer" subjects are Kubernetes service accounts;
# they will later be replaced by OIDC users from Keycloak (Iter 4).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: demo-admin
  namespace: team-demo
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: demo-ml
  namespace: team-demo
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: demo-viewer
  namespace: team-demo
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: demo-admin-binding
  namespace: team-demo
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: aiplatform-project-admin
subjects:
  - kind: ServiceAccount
    name: demo-admin
    namespace: team-demo
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: demo-ml-binding
  namespace: team-demo
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: aiplatform-ml-engineer
subjects:
  - kind: ServiceAccount
    name: demo-ml
    namespace: team-demo
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: demo-viewer-binding
  namespace: team-demo
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: aiplatform-viewer
subjects:
  - kind: ServiceAccount
    name: demo-viewer
    namespace: team-demo
