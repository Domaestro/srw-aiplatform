# Pod Security Admission cluster-wide configuration.
# Default policy: 'baseline' (warn) on every namespace.
# Namespaces created by the platform will be explicitly labelled with stricter policies.
apiVersion: apiserver.config.k8s.io/v1
kind: AdmissionConfiguration
plugins:
  - name: PodSecurity
    configuration:
      apiVersion: pod-security.admission.config.k8s.io/v1
      kind: PodSecurityConfiguration
      defaults:
        enforce: "baseline"
        enforce-version: "latest"
        audit: "restricted"
        audit-version: "latest"
        warn: "restricted"
        warn-version: "latest"
      exemptions:
        usernames: []
        runtimeClasses: []
        # System components that need elevated privileges are exempted here.
        namespaces:
          - kube-system
          - kube-public
          - kube-node-lease
          - cert-manager
          - istio-system
          - istio-ingress
          - kubeflow
          - knative-serving
          - monitoring
          - local-path-storage
