# Default-deny network policies for tenant and platform namespaces.
# Strategy: deny all ingress/egress by default in every namespace, then add explicit allow
# rules during the iterations that bring up MLflow/Keycloak/Istio/Kubeflow.
#
# DNS egress is permitted to kube-system (CoreDNS) because most workloads need name
# resolution. All other east-west traffic must be allow-listed explicitly.
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: team-demo
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: team-demo
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
