# Resource constraints applied to every tenant namespace.
# Caps are intentionally conservative for the on-laptop prototype (16 GB host).
# Production deployments will tune ResourceQuota per project.
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: tenant-quota
  namespace: team-demo
spec:
  hard:
    requests.cpu: "4"
    requests.memory: 6Gi
    limits.cpu: "8"
    limits.memory: 10Gi
    requests.ephemeral-storage: 5Gi
    limits.ephemeral-storage: 10Gi
    persistentvolumeclaims: "10"
    requests.storage: 20Gi
    count/pods: "30"
    count/services: "20"
    count/configmaps: "30"
    count/secrets: "30"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: tenant-defaults
  namespace: team-demo
spec:
  limits:
    - type: Container
      default:
        cpu: 500m
        memory: 512Mi
      defaultRequest:
        cpu: 100m
        memory: 128Mi
      max:
        cpu: "4"
        memory: 8Gi
      min:
        cpu: 10m
        memory: 32Mi
    - type: PersistentVolumeClaim
      max:
        storage: 10Gi
      min:
        storage: 100Mi
