# MinIO standalone deployment for the prototype, official MinIO Inc. chart v5.4.
# Reference: https://github.com/minio/minio/tree/master/helm/minio
mode: standalone
replicas: 1

# Root credentials are provisioned via an external Secret (see scripts/04_install_minio.sh).
# The chart honours: rootUser/rootPassword from the secret keys with the same names.
existingSecret: minio-root-credentials

# Default buckets created on startup.
buckets:
  - name: mlflow-artifacts
    policy: none
    purge: false
    versioning: true
    objectlocking: false
  - name: kubeflow-pipelines
    policy: none
    purge: false
    versioning: true
    objectlocking: false
  - name: model-registry
    policy: none
    purge: false
    versioning: true
    objectlocking: false

# TLS configuration.
# cert-manager places the leaf cert and key into 'minio-tls' under keys tls.crt/tls.key,
# while MinIO chart expects keys named public.crt / private.key by default.
# We override the key names to point at the cert-manager-issued material.
tls:
  enabled: true
  certSecret: minio-tls
  publicCrt: tls.crt
  privateKey: tls.key

# The CA that signed the MinIO cert must be present in the server's trust bundle so
# the embedded mc client (and bucket-creation hook) can talk to the API over TLS.
trustedCertsSecret: minio-tls

# Persistence on the local-path provisioner that ships with k3s.
persistence:
  enabled: true
  size: 10Gi
  storageClass: local-path

# Pin MinIO to the 'system' role node.
nodeSelector:
  node-role.aiplatform/system: "true"

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 1
    memory: 1Gi

# MinIO runs as uid 1000 by default; tighten the container security context further.
securityContext:
  enabled: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  fsGroupChangePolicy: OnRootMismatch
  runAsNonRoot: true

containerSecurityContext:
  enabled: true
  runAsUser: 1000
  runAsGroup: 1000
  runAsNonRoot: true
  allowPrivilegeEscalation: false
  capabilities:
    drop: ["ALL"]
  seccompProfile:
    type: RuntimeDefault
  readOnlyRootFilesystem: false

# Service: cluster-internal only; ingress will be configured via Istio (Iter 5).
service:
  type: ClusterIP
  port: 9000
consoleService:
  type: ClusterIP
  port: 9001

# Prometheus integration left disabled; enabled in Iter 6.
metrics:
  serviceMonitor:
    enabled: false
